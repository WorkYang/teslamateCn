name: Sync to Gitee

on:
  push:
    branches: [ "main", "develop" ]

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configure Gitee remote
        run: |
          git remote remove origin
          token_encoded="${{ secrets.GITEE_PASSWORD }}"
          token_encoded="${token_encoded//@/%40}"
          git remote add gitee "https://hnlyyp:${token_encoded}@gitee.com/hnlyyp/teslamateCn.git"

      - name: Sync to Gitee
        run: |
          git push gitee main develop
